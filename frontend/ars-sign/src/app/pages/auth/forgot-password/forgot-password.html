<section
    class="bg-gray-50 dark:bg-gray-900 bg-[url('https://flowbite.s3.amazonaws.com/docs/jumbotron/conference.jpg')] bg-gray-700 bg-blend-multiply bg-cover bg-center min-h-screen flex items-center justify-center">
    <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0 w-full max-w-md">
        <a routerLink="/" class="flex items-center mb-6 text-4xl font-extrabold text-primary">
            ARsign
        </a>
        <div
            class="w-full bg-secondary rounded-lg shadow dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700 opacity-95">
            <div class="p-6 space-y-4 md:space-y-6 sm:p-8">
                <h1 class="text-xl font-bold leading-tight tracking-tight text-white md:text-2xl text-center">
                    {{ 'Reset Password' | translate }}
                </h1>

                <div *ngIf="message"
                    class="p-4 mb-4 text-sm text-green-800 rounded-lg bg-green-50 dark:bg-gray-800 dark:text-green-400"
                    role="alert">
                    {{ message }}
                </div>

                <div *ngIf="error"
                    class="p-4 mb-4 text-sm text-red-800 rounded-lg bg-red-50 dark:bg-gray-800 dark:text-red-400"
                    role="alert">
                    {{ error }}
                </div>

                <!-- Step 1: Enter Email -->
                <form *ngIf="step === 'EMAIL'" class="space-y-4 md:space-y-6" (ngSubmit)="onSubmit()">
                    <div>
                        <label for="email" class="block mb-2 text-sm font-medium text-white">{{ 'Email Address' |
                            translate }}</label>
                        <input type="email" name="email" id="email" [(ngModel)]="email"
                            class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                            placeholder="name@company.com" required>
                    </div>

                    <button type="submit"
                        class="w-full text-secondary bg-primary hover:bg-yellow-400 focus:ring-4 focus:outline-none focus:ring-primary-300 font-bold rounded-lg text-lg px-5 py-2.5 text-center transition-all shadow-lg active:scale-95">
                        {{ 'Send Reset Code' | translate }}
                    </button>

                    <div class="text-center">
                        <a routerLink="/login" class="text-sm font-medium text-primary hover:underline">{{ 'Back to
                            Login' | translate }}</a>
                    </div>
                </form>

                <!-- Step 2: Enter Code & New Password -->
                <form *ngIf="step === 'CODE'" class="space-y-4 md:space-y-6" (ngSubmit)="verifyAndReset()">
                    <div>
                        <label for="code" class="block mb-2 text-sm font-medium text-white">{{ 'Verification Code' |
                            translate }}</label>
                        <input type="text" name="code" id="code" [(ngModel)]="verificationCode"
                            class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                            placeholder="Enter 6-digit code" required>
                    </div>

                    <div>
                        <label for="newPassword" class="block mb-2 text-sm font-medium text-white">{{ 'New Password' |
                            translate }}</label>
                        <input type="password" name="newPassword" id="newPassword" [(ngModel)]="newPassword"
                            class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                            placeholder="••••••••" required>
                    </div>

                    <button type="submit"
                        class="w-full text-secondary bg-primary hover:bg-yellow-400 focus:ring-4 focus:outline-none focus:ring-primary-300 font-bold rounded-lg text-lg px-5 py-2.5 text-center transition-all shadow-lg active:scale-95">
                        {{ 'Reset Password' | translate }}
                    </button>

                    <div class="text-center">
                        <button type="button" (click)="step = 'EMAIL'"
                            class="text-sm font-medium text-primary hover:underline">
                            {{ 'Back to Email' | translate }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
