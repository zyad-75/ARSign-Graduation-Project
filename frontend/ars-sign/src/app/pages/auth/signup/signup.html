<section class="min-h-screen relative overflow-hidden flex items-center justify-center py-12 px-4 shadow-2xl">
    <div class="animated-bg"><div class="blob-3"></div></div>

    <div class="relative z-10 w-full max-w-2xl">
        <div class="glass-card p-10 rounded-3xl border border-white/10 shadow-2xl backdrop-blur-2xl animate-fade-in-up">
            <div class="text-center mb-10">
                <a routerLink="/" class="inline-flex items-center gap-3 group">
                    <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-primary to-yellow-500 flex items-center justify-center text-secondary font-black text-2xl group-hover:rotate-6 transition-transform">
                        AR
                    </div>
                    <span class="text-3xl font-black text-white tracking-tighter">ARsign</span>
                </a>
            </div>

            <h1 class="text-2xl font-black text-white mb-8 text-center">
                {{ 'Create Account' | translate }}
            </h1>

            <!-- Error Alert -->
            <div *ngIf="errorMessage"
                class="p-4 mb-6 text-sm text-red-400 bg-red-900/30 border border-red-500/50 rounded-2xl animate-fade-in-up">
                <span class="font-bold">{{ 'Error' | translate }}:</span> {{ errorMessage }}
            </div>

            <!-- Success Alert -->
            <div *ngIf="successMessage"
                class="p-4 mb-6 text-sm text-green-400 bg-green-900/30 border border-green-500/50 rounded-2xl animate-fade-in-up">
                <span class="font-bold">{{ 'Success' | translate }}!</span> {{ successMessage }}
            </div>

            <form class="space-y-6" (submit)="signup($event)">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-300">{{ 'First Name' | translate }}</label>
                        <input type="text" [(ngModel)]="firstName" name="firstName" required
                            class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all font-medium">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-300">{{ 'Last Name' | translate }}</label>
                        <input type="text" [(ngModel)]="lastName" name="lastName" required
                            class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all font-medium">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-300">{{ 'Email Address' | translate }}</label>
                        <input type="email" [(ngModel)]="email" name="email" required
                            class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all font-medium"
                            placeholder="name@company.com">
                    </div>
                    <div>
                        <label class="block mb-2 text-sm font-medium text-gray-300">{{ 'Phone Number' | translate }}</label>
                        <input type="tel" [(ngModel)]="phone" name="phone" required
                            class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all font-medium"
                            placeholder="+1234567890">
                    </div>
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-300">{{ 'Password' | translate }}</label>
                    <input type="password" [(ngModel)]="password" name="password" required
                        class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all font-medium"
                        placeholder="••••••••">
                </div>

                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-300">{{ 'Confirm Password' | translate }}</label>
                    <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" required
                        class="w-full p-4 rounded-2xl bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-primary/50 transition-all font-medium"
                        placeholder="••••••••">
                </div>

                <button type="submit" [disabled]="loading"
                    class="w-full py-4 rounded-2xl bg-primary text-secondary font-black hover:bg-yellow-400 focus:ring-4 focus:ring-primary/30 transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-primary/20 disabled:opacity-50">
                    <span *ngIf="!loading">{{ 'Create Account' | translate }}</span>
                    <span *ngIf="loading" class="flex items-center justify-center">
                        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-secondary"
                            xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                            </path>
                        </svg>
                        {{ 'Processing' | translate }}...
                    </span>
                </button>

                <p class="text-sm font-medium text-gray-400 text-center">
                    {{ 'Already have an account?' | translate }}
                    <a routerLink="/login" class="text-primary font-bold hover:underline transition-colors">{{
                        'Login here' | translate }}</a>
                </p>
            </form>
        </div>
    </div>
</section>
